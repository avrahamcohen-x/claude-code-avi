name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@v1.0.30
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for security vulnerabilities. Focus on:
            - Hardcoded secrets, passwords, API keys, or credentials
            - SQL injection and other injection attacks
            - Insecure authentication or password handling
            - Sensitive data exposure
            - Any other OWASP Top 10 vulnerabilities

            For each finding, explain the vulnerability, its severity, and how to fix it.
            Comment directly on the relevant lines in the PR.
